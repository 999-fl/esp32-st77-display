; PlatformIO Project Configuration File — ideaspark ESP32 (1.14"/1.19" ST7789 135x240)
;
; Uses a proper custom board id (see boards/_boards_json/ideaspark-esp32.json)
; instead of the generic built-in "esp32dev" board. This matters: with the
; generic board, framework-native libraries (Wire/SPI/SD) never picked up
; this board's pins_arduino.h no matter what override was tried - only a
; real custom board JSON with its own "variant" field fixes that for every
; part of the build, not just project-level source files.
;
; Pin numbers below come from ideaspark's own product manual/listing for this board:
;     MOSI=23  SCLK=18  CS=15  DC=2  RST=4  BL(backlight)=32

[env:ideaspark-esp32]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36/platform-espressif32.zip
framework = arduino
board = ideaspark-esp32
board_build.partitions = custom_4Mb_full.csv
board_build.variants_dir = boards
build_src_filter = ${env.build_src_filter} +<../boards/ideaspark-esp32>
build_flags =
	${env.build_flags}
	${env_4mb.build_flags}

	-DDEVICE_NAME='"ideaspark-esp32"'

	; Fixes "locale/en-AU.h: No such file" from IRremoteESP8266 - pin to
	; the library's standard bundled locale.
	-D_IR_LOCALE_=en-US

	; --- TFT_eSPI setup (ST7789, 135x240) ---
	-DUSER_SETUP_LOADED=1
	-DST7789_DRIVER=1
	-DTFT_WIDTH=135
	-DTFT_HEIGHT=240
	-DTFT_MOSI=23
	-DTFT_SCLK=18
	-DTFT_CS=15
	-DTFT_DC=2
	-DTFT_RST=4
	-DTFT_BL=32
	-DTFT_BACKLIGHT_ON=HIGH
	-DSMOOTH_FONT=1
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=16000000
	-DSPI_TOUCH_FREQUENCY=2500000
	-DTOUCH_CS=-1

lib_deps =
	${env.lib_deps}

lib_ignore =
	${env_4mb.lib_ignore}
	FFat
